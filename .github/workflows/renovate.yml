name: Renovate

# Self-hosted Renovate: bumps the upstream Sure (we-promise/sure) version pinned
# in package.nix, then runs scripts/update-gemset.sh (postUpgradeTask) to
# regenerate gemset.nix (bundix + per-gem platform-hash fixups) and the src hash
# so the PR is build-ready — something the Mend-hosted app cannot do (no Nix).
# NOTE: the Nix `patches`/postPatch in package.nix apply at build time, not in the
# script, so the PR still opens even if a patch later fails to apply on a bump —
# review the build before merging. Review + merge manually; no auto-merge.

on:
  workflow_dispatch:
  schedule:
    - cron: "7 7 * * 1" # weekly, Monday ~07:07 UTC

permissions:
  contents: write
  pull-requests: write
  issues: write # Dependency Dashboard (config:recommended) is created as an issue

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install hash tools (nix-prefetch-github)
        # bundix is built by update-gemset.sh itself; git + perl are preinstalled.
        run: nix profile install nixpkgs#nix-prefetch-github

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ github.token }}
          RENOVATE_REPOSITORIES: nSimonFR/sure-nix
          RENOVATE_PLATFORM: github
          # postUpgradeTasks run arbitrary commands, so the runner (not repo
          # config) must allow-list them — a repo cannot self-grant execution.
          # sure-nix's postUpgradeTasks run the gemset regenerator then `git add`.
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^bash scripts/update-gemset\\.sh ", "^git add "]'
          LOG_LEVEL: info
        run: npx --yes renovate

      - name: Notify Telegram on open Renovate PRs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          [ -z "${TELEGRAM_BOT_TOKEN:-}" ] && { echo "no TELEGRAM_BOT_TOKEN secret; skipping"; exit 0; }
          prs=$(gh pr list --repo nSimonFR/sure-nix --state open \
                  --json title,url,headRefName \
                  --jq '.[] | select(.headRefName|startswith("renovate/")) | "• \(.title)\n\(.url)"' 2>/dev/null || true)
          [ -z "$prs" ] && { echo "no open renovate PRs; skipping"; exit 0; }
          msg="Renovate — sure-nix"$'\n'"$prs"
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id=82389391 \
            --data-urlencode "text=${msg}" >/dev/null || true
